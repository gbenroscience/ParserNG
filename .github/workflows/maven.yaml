name: Java CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        java-version: [ 8, 11, 17, 21, 25 ]
      fail-fast: false
    name: ${{ matrix.os }} - Java ${{ matrix.java-version }} - Maven
    steps:
      - name: Checkout ParserNG repo
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Build ParserNG with Maven
        shell: bash
        run: |
          echo "Building with Java ${{ matrix.java-version }}"

          if [ "${{ matrix.java-version }}" -eq 25 ]; then
            echo "Java 25 detected → Building all modules (including parser-ng-bench)"
            mvn -B --update-snapshots clean install -Dgpg.skip
          
          elif [ "${{ matrix.java-version }}" -ge 21 ]; then
            echo "Java 21-24 detected → Building core + SIMD (excluding parser-ng-bench)"
            mvn -B --update-snapshots clean install -Dgpg.skip -pl "!parser-ng-bench"
          
          else
            echo "Legacy Java (< 21) detected → Building core engine only (excluding SIMD and bench)"
            mvn -B --update-snapshots clean install -Dgpg.skip -pl "!parser-ng-simd,!parser-ng-bench"
          fi