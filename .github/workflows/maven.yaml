name: Java CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        java-version: [ 8, 11, 17, 21, 25 ]
      fail-fast: false

    name: ${{ matrix.os }} - Java ${{ matrix.java-version }} - Maven

    steps:
      - name: Checkout ParserNG repo
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Build ParserNG with Maven
        run: |
          if [[ "${{ matrix.java-version }}" -ge 21 ]]; then
            # Build everything (including SIMD) on Java 21+
            mvn -B --update-snapshots clean install -Dgpg.skip
          else
            # Skip SIMD module on Java 8/11/17 (requires Java 21+)
            mvn -B --update-snapshots clean install -Dgpg.skip -pl !parser-ng-simd
          fi