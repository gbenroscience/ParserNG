name: Java CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        java-version: [ 8, 11, 17, 21, 25 ]
      fail-fast: false

    name: ${{ matrix.os }} - Java ${{ matrix.java-version }} - Maven

    steps:
      - name: Checkout ParserNG repo
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      # Fixed: Added 'shell: bash' to guarantee your condition executes everywhere
      - name: Build ParserNG with Maven
        shell: bash
        run: |
          if [ "${{ matrix.java-version }}" -ge 21 ]; then
            echo "Detected Java 21+. Executing full hardware-accelerated SIMD suite..."
            mvn -B --update-snapshots clean install -Dgpg.skip
          else
            echo "Detected legacy Java baseline (< 21). Reactor isolating core engine..."
            mvn -B --update-snapshots clean install -Dgpg.skip -pl !parser-ng-simd
          fi